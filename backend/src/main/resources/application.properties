# =============================================
# Database Configuration
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/clockin_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================
# JWT Configuration
# IMPORTANT: Change jwt.secret to a strong random value in production
# =============================================
jwt.secret=ClockInSystemSecretKey2024JWTSigningKeyMustBe256BitsLongForSecurity!
jwt.expiration=86400000

# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# CORS - add your Vercel frontend URL here
# =============================================
cors.allowed-origins=http://localhost:4200,https://clockin-system.vercel.app
