<div class="admin-page">

  <!-- Top Bar -->
  <header class="top-bar">
    <span class="top-bar-brand">ClockIn System &mdash; Admin</span>
    <div class="top-bar-user">
      <span>{{ currentUser?.employeeName }}</span>
      <span class="badge badge-admin">Admin</span>
      <button class="btn btn-outline" (click)="logout()">Sign Out</button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button
      class="tab-btn"
      [class.active]="activeTab === 'employees'"
      (click)="activeTab = 'employees'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      Employee Management
    </button>
    <button
      class="tab-btn"
      [class.active]="activeTab === 'attendance'"
      (click)="activeTab = 'attendance'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
      </svg>
      Attendance Report
    </button>
  </nav>

  <!-- Tab Content -->
  <div class="tab-content">
    <app-employee-list  *ngIf="activeTab === 'employees'"></app-employee-list>
    <app-attendance-report *ngIf="activeTab === 'attendance'"></app-attendance-report>
  </div>

</div>
