<div class="tracker-page">

  <!-- Header -->
  <header class="tracker-header">
    <span class="brand">Time Tracker</span>
    <div class="header-right">
      <span class="user-name">{{ currentUser?.employeeName }}</span>
      <button class="btn-signout" (click)="logout()">Sign Out</button>
    </div>
  </header>

  <!-- Main Card -->
  <main class="tracker-main">
    <div class="tracker-card">

      <!-- Live Date & Time -->
      <div class="datetime-row">
        <div class="date-block">
          <div class="dt-label">DATE</div>
          <div class="dt-value">{{ currentTime | date:'MM/dd/yyyy' }}</div>
        </div>
        <div class="clock-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="time-block">
          <div class="dt-label">TIME</div>
          <div class="dt-value">{{ currentTime | date:'hh:mm:ss a' }}</div>
        </div>
      </div>

      <!-- Status -->
      <div class="status-row">
        <span class="status-pill" [class.clocked-in]="isClockedIn" [class.clocked-out]="!isClockedIn">
          <span class="status-dot"></span>
          {{ isClockedIn ? 'CLOCKED IN' : 'CLOCKED OUT' }}
        </span>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-clock clock-in"
          (click)="clockIn()"
          [disabled]="isClockedIn || loading">
          <span class="spinner" *ngIf="loading && !isClockedIn"></span>
          Clock In
        </button>
        <button class="btn-clock clock-out"
          (click)="clockOut()"
          [disabled]="!isClockedIn || loading">
          <span class="spinner" *ngIf="loading && isClockedIn"></span>
          Clock Out
        </button>
      </div>

      <!-- Message -->
      <div class="msg" [ngClass]="'msg-' + messageType" *ngIf="message">
        {{ message }}
      </div>

    </div>
  </main>

</div>
